<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 540 360" width="100%" height="auto">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;700&amp;family=JetBrains+Mono:wght@400;500;700&amp;display=swap');
      
      .terminal-card {
        animation: fadeIn 0.8s ease-out;
      }
      
      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
      }

      /* Theme Colors */
      .bg-rect {
        fill: #0b0f19;
        stroke: #1f2937;
      }
      .lbl-os { fill: #f97316; }
      .lbl-dots { fill: #4b5563; }
      .lbl-val { fill: #38bdf8; }
      .header-name { fill: #34d399; }
      .header-host { fill: #9ca3af; }
      .header-cursor { fill: #38bdf8; }
      .section-text { fill: #9ca3af; }
      .section-line { fill: #1f2937; }
      .lbl-act { fill: #60a5fa; }
      .lbl-act-val { fill: #e5e7eb; }
      .progress-bg { fill: #1f2937; }
      .timestamp-text { fill: #4b5563; }

      @media (prefers-color-scheme: light) {
        .bg-rect {
          fill: #f9fafb;
          stroke: #d1d5db;
        }
        .lbl-os { fill: #ea580c; }
        .lbl-dots { fill: #9ca3af; }
        .lbl-val { fill: #0284c7; }
        .header-name { fill: #059669; }
        .header-host { fill: #4b5563; }
        .header-cursor { fill: #0284c7; }
        .section-text { fill: #4b5563; }
        .section-line { fill: #e5e7eb; }
        .lbl-act { fill: #2563eb; }
        .lbl-act-val { fill: #111827; }
        .progress-bg { fill: #e5e7eb; }
        .timestamp-text { fill: #9ca3af; }
      }
    </style>
  </defs>

  <g class="terminal-card">
    <!-- Window Background -->
    <rect class="bg-rect" x="8" y="8" width="524" height="344" rx="10" stroke-width="1.5" />

    <!-- Typing Header -->
    <g>
      <text x="22" y="34" font-family="'JetBrains Mono', 'Fira Code', monospace" font-size="14.5" font-weight="bold">
        <tspan class="header-name">Harshit Shakya</tspan>
        <tspan class="header-host">@macos:~</tspan>
      </text>
    </g>
    
    <!-- Blinking Cursor -->
    <rect class="header-cursor" x="224.0" y="20" width="8" height="16">
      <animate attributeName="opacity" values="1;0;1" dur="0.8s" repeatCount="indefinite" />
    </rect>

  <text x="22" y="52" font-family="'JetBrains Mono', 'Fira Code', monospace" font-size="14.5" font-weight="600">
    <tspan class="lbl-os">OS</tspan>
    <tspan class="lbl-dots">: .......... </tspan>
    <tspan class="lbl-val">macOS Sequoia, Linux</tspan>
  </text>
  <text x="22" y="67" font-family="'JetBrains Mono', 'Fira Code', monospace" font-size="14.5" font-weight="600">
    <tspan class="lbl-os">Host</tspan>
    <tspan class="lbl-dots">: ........ </tspan>
    <tspan class="lbl-val">MacBook Pro</tspan>
  </text>
  <text x="22" y="82" font-family="'JetBrains Mono', 'Fira Code', monospace" font-size="14.5" font-weight="600">
    <tspan class="lbl-os">Location</tspan>
    <tspan class="lbl-dots">: .... </tspan>
    <tspan class="lbl-val">India</tspan>
