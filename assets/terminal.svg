    <tspan class="lbl-dots">: ....... </tspan>
    <tspan class="lbl-val">Advanced Agentic AI &amp; Systems Engineering</tspan>
  </text>
  <text x="22" y="131" font-family="'JetBrains Mono', 'Fira Code', monospace" font-size="14" font-weight="700">
    <tspan class="section-text">─ Technical Profile </tspan>
    <tspan class="section-line">──────────────────────────────────</tspan>
  </text>
  <text x="22" y="146" font-family="'JetBrains Mono', 'Fira Code', monospace" font-size="14.5" font-weight="600">
    <tspan class="lbl-os">Languages</tspan>
    <tspan class="lbl-dots">: ... </tspan>
    <tspan class="lbl-val">Python, JavaScript, TypeScript, Swift, C++</tspan>
