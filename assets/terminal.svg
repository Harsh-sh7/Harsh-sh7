    <tspan class="lbl-dots">: ...... </tspan>
    <tspan class="lbl-val">VS Code, Xcode, Vim</tspan>
  </text>
  <text x="22" y="112" font-family="'JetBrains Mono', 'Fira Code', monospace" font-size="14.5" font-weight="600">
