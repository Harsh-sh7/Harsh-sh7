    <tspan class="lbl-dots">: .. </tspan>
    <tspan class="lbl-val">Next.js, React, SwiftUI, FastAPI</tspan>
  </text>
  <text x="22" y="176" font-family="'JetBrains Mono', 'Fira Code', monospace" font-size="14.5" font-weight="600">
    <tspan class="lbl-os">Database</tspan>
    <tspan class="lbl-dots">: .... </tspan>
    <tspan class="lbl-val">PostgreSQL, MongoDB, Redis</tspan>
  </text>
  <text x="22" y="195" font-family="'JetBrains Mono', 'Fira Code', monospace" font-size="14" font-weight="700">
    <tspan class="section-text">─ GitHub Stats </tspan>
    <tspan class="section-line">───────────────────────────────────────</tspan>
  </text>
  <text x="22" y="210" font-family="'JetBrains Mono', 'Fira Code', monospace" font-size="14.5" font-weight="600">
    <tspan class="lbl-os">Repos</tspan>
    <tspan class="lbl-dots">: ....... </tspan>
    <tspan class="lbl-val">31 public repos</tspan>
  </text>
  <text x="22" y="225" font-family="'JetBrains Mono', 'Fira Code', monospace" font-size="14.5" font-weight="600">
    <tspan class="lbl-os">Followers</tspan>
    <tspan class="lbl-dots">: ... </tspan>
    <tspan class="lbl-val">7 | Following: 4</tspan>
  </text>
  <text x="22" y="240" font-family="'JetBrains Mono', 'Fira Code', monospace" font-size="14.5" font-weight="600">
    <tspan class="lbl-os">Activity</tspan>
    <tspan class="lbl-dots">: .... </tspan>
    <tspan class="lbl-val">225 contributions | Streak: 5d</tspan>
  </text>
  <text x="22" y="255" font-family="'JetBrains Mono', 'Fira Code', monospace" font-size="14.5" font-weight="600">
    <tspan class="lbl-os">Top Lang</tspan>
    <tspan class="lbl-dots">: .... </tspan>
    <tspan class="lbl-val">Jupyter Notebook, TypeScript, JavaScript</tspan>
  </text>
  <!-- Progress Bar -->
  <rect class="progress-bg" x="145" y="263" width="240" height="6" rx="3" />
  <rect x="145" y="263" width="138.5" height="6" rx="2" fill="#DA5B0B" />
  <rect x="283.48" y="263" width="52.1" height="6" rx="2" fill="#3178c6" />
  <rect x="335.56" y="263" width="31.9" height="6" rx="2" fill="#f1e05a" />
  <rect x="367.48" y="263" width="11.3" height="6" rx="2" fill="#3572A5" />
  <text x="22" y="282" font-family="'JetBrains Mono', 'Fira Code', monospace" font-size="14" font-weight="700">
    <tspan class="section-text">─ Recent Activity </tspan>
    <tspan class="section-line">────────────────────────────────────</tspan>
  </text>
  <text x="22" y="297" font-family="'JetBrains Mono', 'Fira Code', monospace" font-size="14.5" font-weight="600">
    <tspan class="lbl-act">Act 1</tspan>
    <tspan class="lbl-dots">: ....... </tspan>
    <tspan class="lbl-act-val">Commented on issue #12 in newton-school-ai/...</tspan>
  </text>
  <text x="22" y="312" font-family="'JetBrains Mono', 'Fira Code', monospace" font-size="14.5" font-weight="600">
    <tspan class="lbl-act">Act 2</tspan>
    <tspan class="lbl-dots">: ....... </tspan>
    <tspan class="lbl-act-val">Assigned issue #12 in newton-school-ai/slmf...</tspan>
  </text>
  <!-- Bottom Timestamp -->
  <text x="22" y="330" class="timestamp-text" font-family="'JetBrains Mono', 'Fira Code', monospace" font-size="11" font-weight="bold">
    Last Updated: 2026-07-22 14:12:45 (auto-updated every 12h)
  </text>
  </g>
</svg>