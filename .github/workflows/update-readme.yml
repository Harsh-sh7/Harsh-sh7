name: Update Terminal Profile Card

on:
  schedule:
    - cron: '0 */12 * * *' # Runs every 12 hours
  push:
    branches:
      - main
      - master
  workflow_dispatch: # Allows manual triggers

jobs:
  update-svg:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pillow requests

      - name: Generate SVG Profile Card
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python scripts/generate_svg.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/ README.md
          if ! git diff --cached --quiet; then
            git commit -m "Auto-update terminal profile assets and contribution tree [skip ci]"
            git push
          else
            echo "No changes in terminal assets, skipping commit."
          fi
